<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary SEO ─────────────────────────────────────────────── -->
    <title>ToolNix - Free Online PDF, Image &amp; Developer Tools</title>
    <meta name="description" content="ToolNix offers 40+ free online tools. Convert PDF to Word, edit PDFs, remove backgrounds, compress images, generate QR codes, and more! 100% free with no registration required." />
    <meta name="keywords" content="free online tools, pdf tools, pdf to word, word to pdf, pdf converter, image compressor, background remover, remove bg, edit pdf online, merge pdf, split pdf, jpg to pdf, pdf to excel, developer tools, qr code generator, format converter, ocr image to text, extract text from image, toolnix" />
    <meta name="author" content="ToolNix" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#2b5ce7" />

    <!-- ─── Canonical ────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://toolnix.pro/" />

    <!-- ─── Favicon ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ─── Open Graph / Facebook ───────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ToolNix" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://toolnix.pro/" />
    <meta property="og:title" content="ToolNix - Free Online PDF, Image &amp; Developer Tools" />
    <meta property="og:description" content="Convert, edit, and compress PDFs and Images online for free. 40+ premium tools without registration." />
    <meta property="og:image" content="https://toolnix.pro/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ToolNix - 40+ Free Online Tools for PDF, Image &amp; More" />

    <!-- ─── Twitter Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@toolnix" />
    <meta name="twitter:title" content="ToolNix - Free Online PDF, Image &amp; Developer Tools" />
    <meta name="twitter:description" content="Convert, edit, and compress PDFs and Images online for free. 40+ premium tools without registration." />
    <meta name="twitter:image" content="https://toolnix.pro/og-image.png" />
    <meta name="twitter:image:alt" content="ToolNix - 40+ Free Online PDF &amp; Image Tools" />

    <!-- ─── Performance: Preconnect ──────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ─── Static JSON-LD: WebSite + Organization ───────────────────── -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ToolNix",
        "url": "https://toolnix.pro",
        "description": "40+ free online tools for PDF, image, and developer workflows. No registration required.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://toolnix.pro/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ToolNix",
        "url": "https://toolnix.pro",
        "logo": "https://toolnix.pro/favicon.svg",
        "description": "ToolNix provides 40+ free online tools for working with PDFs, images, and developer workflows.",
        "sameAs": []
      }
    ]
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
