# Nginx Configuration for ToolNix (toolnix.pro)
# Copy this to /etc/nginx/sites-available/toolnix.pro and create a symlink in sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name toolnix.pro www.toolnix.pro;

    # Where the docker volume mounts the built frontend static files
    # Make sure the path matches your VPS setup (e.g., /var/lib/docker/volumes/toolnix_frontend_dist/_data)
    # Alternatively, you can copy the dist files to /var/www/toolnix.pro/html
    root /var/www/toolnix.pro/html;
    index index.html;

    # Serve Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and Admin requests to Django Backend
    location ~ ^/(api|admin)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long document conversions
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        
        # Allow large file uploads (PDFs, PPTXs, etc.)
        client_max_body_size 100M;
    }

    # Serve Django Media files directly
    location /media/ {
        alias /var/www/toolnix.pro/media/;
    }

    # Serve Django Static files directly (needed for Django Admin CSS/JS)
    location /static/ {
        # The backend container volume maps staticfiles here
        proxy_pass http://127.0.0.1:8000/static/;
    }
}
