<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e54040" />
      <stop offset="100%" stop-color="#ff6b6b" />
    </linearGradient>
  </defs>

  <!-- Rounded square — matches --radius-md (approx 14px on 64px canvas) -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" />

  <!-- Bold white T — centered, heavy weight -->
  <text
    x="30"
    y="49"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="44"
    font-weight="900"
    text-anchor="middle"
    fill="white"
  >T</text>

  <!-- Small pink heart — top-right of T, matching #fca5a5 from Navbar.jsx -->
  <text
    x="46"
    y="24"
    font-family="Arial, sans-serif"
    font-size="14"
    text-anchor="middle"
    fill="#fca5a5"
  >♥</text>
</svg>