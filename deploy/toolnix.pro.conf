# Nginx Configuration for ToolNix (toolnix.pro)
# Copy this to /etc/nginx/sites-available/toolnix.pro and create a symlink in sites-enabled
#
# Architecture:
#   - Static assets (JS, CSS, fonts, images) → served by Nginx directly from /var/www/toolnix.pro/html
#   - All HTML page requests → proxied to Django (port 8000)
#   - Django injects the correct <title> and <meta> tags per URL before serving index.html
#   - This makes every tool page unique in Google Search — no more same title for all pages

server {
    listen 80;
    listen [::]:80;
    server_name toolnix.pro www.toolnix.pro;

    # Root of built React frontend
    root /var/www/toolnix.pro/html;

    # ── Static Assets — served directly by Nginx (fast, cached) ───────────────
    # JS bundles, CSS, images, fonts, icons, manifests
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|map|webmanifest|txt|xml)$ {
        root /var/www/toolnix.pro/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API & Admin — proxied to Django ──────────────────────────────────────
    location ~ ^/(api|admin)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long document conversions
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;

        # Allow large file uploads (PDFs, PPTXs, etc.)
        client_max_body_size 100M;
    }

    # ── Django Media files ────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/toolnix.pro/media/;
    }

    # ── Django Static files (Admin CSS/JS) ───────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
    }

    # ── CKEditor ─────────────────────────────────────────────────────────────
    location /ckeditor/ {
        proxy_pass http://127.0.0.1:8000/ckeditor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All HTML Routes → Django SSR Meta Injection ───────────────────────────
    # Django reads index.html, injects the correct title/description, returns it.
    # Google crawls these pages and sees unique, correct meta tags in raw HTML.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
